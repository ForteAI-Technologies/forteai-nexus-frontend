name: Frontend Deployment Pipeline
 
on:

  push:

    branches:

      - main

  workflow_dispatch:
 
jobs:

  deploy:

    runs-on: ubuntu-latest
 
    steps:

      # 1️⃣ Checkout the repository

      - name: Checkout Repository

        uses: actions/checkout@v3
 
      # 2️⃣ Install sshpass

      - name: Install sshpass

        run: sudo apt-get install -y sshpass
 
      # 3️⃣ Build the frontend project

      - name: Build Frontend

        run: |

          npm install

          npm run build
 
      # 4️⃣ Copy build files to Bastion Host

      - name: Copy Build to Bastion

        run: |

          sshpass -p "$BASTION_PASS" scp -o StrictHostKeyChecking=no -r dist ec2-user@13.204.190.46:/tmp/frontend-dist
 
      # 5️⃣ SSH into Bastion and then into Frontend server to deploy

      - name: Deploy to Frontend Server via Bastion

        run: |

          sshpass -p "$BASTION_PASS" ssh -o StrictHostKeyChecking=no ec2-user@13.204.190.46 "

            sshpass -p \"$FRONTEND_PASS\" ssh -o StrictHostKeyChecking=no ec2-user@10.0.143.197 '

              sudo rm -rf /usr/share/nginx/html/* &&

              sudo cp -r /tmp/frontend-dist/* /usr/share/nginx/html/ &&

              sudo systemctl restart nginx

            '

          "
 
      # 6️⃣ Copy deployed files for verification (new step)

      - name: Copy Deployed Files to Project Folder (for visibility)

        run: |

          sshpass -p "$BASTION_PASS" ssh -o StrictHostKeyChecking=no ec2-user@13.204.190.46 "

            sshpass -p \"$FRONTEND_PASS\" ssh -o StrictHostKeyChecking=no ec2-user@10.0.143.197 '

              mkdir -p /home/ec2-user/frontend/forteai-nexus-frontend/dist &&

              sudo cp -r /usr/share/nginx/html/* /home/ec2-user/frontend/forteai-nexus-frontend/dist/

            '

          "
 
 
