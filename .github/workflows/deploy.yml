name: Frontend Deployment Pipeline (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Step 3: Setup Environment
      - name: Setup Environment
        run: |
          echo "${{ secrets.FRONTEND_ENV }}" > .env
          echo "✅ Loaded environment variables from GitHub Secrets"
          cat .env

      # Step 4: Install dependencies and build
      - name: Install Dependencies & Build
        run: |
          rm -rf node_modules dist
          npm install --legacy-peer-deps
          npm run build

      # Step 5: Verify build
      - name: Verify Build Output
        run: ls -la dist

      # Step 6: Install sshpass
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      # Step 7: Deploy to EC2 via Bastion
      - name: Deploy to EC2 via Bastion
        run: |
          echo "🚀 Deploying full project to production..."
          
          # Step 7.1: Clean and prepare /tmp/frontend-full on Bastion
          sshpass -p 'forteai@123' ssh -o StrictHostKeyChecking=no ec2-user@13.204.190.46 "mkdir -p /tmp/frontend-full && rm -rf /tmp/frontend-full/*"

          # Step 7.2: Copy full frontend code to Bastion
          echo "📦 Copying code to Bastion..."
          sshpass -p "forteai@123" scp -o StrictHostKeyChecking=no -r . ec2-user@13.204.190.46:/tmp/frontend-full/

          # Step 7.3: Copy from Bastion to Frontend EC2
          echo "📤 Copying from Bastion to Frontend EC2..."
          sshpass -p "forteai@123" ssh -o StrictHostKeyChecking=no ec2-user@13.204.190.46 "
            sshpass -p 'forteai@1234' ssh -o StrictHostKeyChecking=no ec2-user@10.0.143.197 '
              echo \"🧹 Cleaning old frontend directory...\"
              sudo rm -rf /home/ec2-user/frontend/forteai-nexus-frontend &&
              sudo mkdir -p /home/ec2-user/frontend/forteai-nexus-frontend &&
              sudo chown -R ec2-user:ec2-user /home/ec2-user/frontend/forteai-nexus-frontend
            '

            echo \"📦 Copying new frontend files...\"
            sshpass -p 'forteai@1234' scp -o StrictHostKeyChecking=no -r /tmp/frontend-full/* ec2-user@10.0.143.197:/home/ec2-user/frontend/forteai-nexus-frontend/
          "

      # Step 8: Deploy build to Nginx directory
      - name: Deploy to Nginx Directory
        run: |
          echo "📂 Updating /usr/share/nginx/html..."
          sshpass -p "forteai@123" ssh -o StrictHostKeyChecking=no ec2-user@13.204.190.46 "
            sshpass -p 'forteai@1234' ssh -o StrictHostKeyChecking=no ec2-user@10.0.143.197 '
              sudo rm -rf /usr/share/nginx/html/* &&
              sudo cp -r /home/ec2-user/frontend/forteai-nexus-frontend/dist/* /usr/share/nginx/html/ &&
              sudo chown -R ec2-user:ec2-user /usr/share/nginx/html
            '
          "

      # Step 9: Restart Nginx
      - name: Restart Nginx
        run: |
          echo "🔄 Restarting Nginx..."
          sshpass -p "forteai@123" ssh -o StrictHostKeyChecking=no ec2-user@13.204.190.46 "
            sshpass -p 'forteai@1234' ssh -o StrictHostKeyChecking=no ec2-user@10.0.143.197 '
              sudo systemctl restart nginx &&
              echo \"✅ Nginx restarted successfully!\"
            '
          "
