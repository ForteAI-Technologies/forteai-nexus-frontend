name: Frontend Deployment Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the latest code
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2️⃣ Install sshpass for password-based SSH/SCP
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      # 3️⃣ Build frontend (adjust if your build command differs)
      - name: Build Frontend
        run: |
          echo "🏗️ Building frontend..."
          npm install
          npm run build

      # 4️⃣ Deploy to Frontend EC2 via Bastion
      - name: Deploy Full Project via Bastion
        run: |
          echo "🚀 Deploying full project to production..."

          # ✅ Step 1: Create and clean temporary folder on Bastion
          sshpass -p 'forteai@123' ssh -o StrictHostKeyChecking=no ec2-user@13.204.190.46 "
            mkdir -p /tmp/frontend-full && rm -rf /tmp/frontend-full/*
          "

          # ✅ Step 2: Copy all frontend files from GitHub runner to Bastion
          sshpass -p 'forteai@123' scp -o StrictHostKeyChecking=no -r . ec2-user@13.204.190.46:/tmp/frontend-full/

          # ✅ Step 3: Transfer build files from Bastion → Frontend EC2
          sshpass -p 'forteai@123' ssh -o StrictHostKeyChecking=no ec2-user@13.204.190.46 "
            sshpass -p 'forteai@1234' ssh -o StrictHostKeyChecking=no ec2-user@10.0.143.197 '
              echo \"🧹 Cleaning old files...\"
              sudo rm -rf /usr/share/nginx/html/* &&
              sudo mkdir -p /usr/share/nginx/html &&
              sudo c
