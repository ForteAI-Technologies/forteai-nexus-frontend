name: Frontend Deployment Pipeline (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Step 3: Setup environment file
      - name: Setup Environment
        run: |
          echo "${{ secrets.FRONTEND_ENV }}" > .env
          echo "✅ Loaded environment variables from GitHub Secrets"
          cat .env

      # Step 4: Install dependencies and build
      - name: Install Dependencies & Build
        run: |
          rm -rf node_modules dist
          npm install --legacy-peer-deps
          npm run build

      # Step 5: Verify build output
      - name: Verify Build Output
        run: |
          ls -la dist

      # Step 6: Install sshpass
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      # Step 7: Deploy to EC2 via Bastion
      - name: Deploy to EC2 via Bastion
        run: |
          echo "🚀 Deploying build to production servers..."
          sshpass -p "forteai@123" ssh -o StrictHostKeyChecking=no ec2-user@13.204.190.46 "
            sshpass -p 'forteai@1234' ssh -o StrictHostKeyChecking=no ec2-user@10.0.143.197 '
              echo \"🧹 Cleaning old files...\"
              sudo rm -rf /usr/share/nginx/html/* &&
              sudo mkdir -p /usr/share/nginx/html &&
              sudo chown ec2-user:ec2-user /usr/share/nginx/html
            '
          "

          echo "📦 Copying build files to Bastion..."
          sshpass -p "forteai@123" scp -o StrictHostKeyChecking=no -r dist/* ec2-user@13.204.190.46:/tmp/frontend-dist/

          echo "📦 Transferring build files to frontend server..."
          sshpass -p "forteai@123" ssh -o StrictHostKeyChecking=no ec2-user@13.204.190.46 "
            sshpass -p 'forteai@1234' scp -o StrictHostKeyChecking=no -r /tmp/frontend-dist/* ec2-user@10.0.143.197:/usr/share/nginx/html/
          "

      # Step 8: Copy deployed files to frontend folder
      - name: Copy Deployed Files to Frontend Folder
        run: |
          echo "📂 Copying deployed files to /home/ec2-user/frontend/forteai-nexus-frontend/dist..."
          sshpass -p "forteai@123" ssh -o StrictHostKeyChecking=no ec2-user@13.204.190.46 "
            sshpass -p 'forteai@1234' ssh -o StrictHostKeyChecking=no ec2-user@10.0.143.197 '
              sudo mkdir -p /home/ec2-user/frontend/forteai-nexus-frontend/dist &&
              sudo chown -R ec2-user:ec2-user /home/ec2-user/frontend/forteai-nexus-frontend &&
              sudo cp -r /usr/share/nginx/html/* /home/ec2-user/frontend/forteai-nexus-frontend/dist/ &&
              sudo chown -R ec2-user:ec2-user /home/ec2-user/frontend/forteai-nexus-frontend/dist &&
              echo \"✅ Files copied successfully to /home/ec2-user/frontend/forteai-nexus-frontend/dist\"
            '
          "

      # Step 9: Restart Nginx on frontend server
      - name: Restart Nginx
        run: |
          echo "🔄 Restarting Nginx..."
          sshpass -p "forteai@123" ssh -o StrictHostKeyChecking=no ec2-user@13.204.190.46 "
            sshpass -p 'forteai@1234' ssh -o StrictHostKeyChecking=no ec2-user@10.0.143.197 '
              sudo systemctl restart nginx &&
              echo \"✅ Nginx restarted successfully!\"
            '
          "
